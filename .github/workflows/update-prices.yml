name: Update Commodity Prices

on:
  schedule:
    # 每周一、三、五 UTC 14:00 = 苏里南 11:00
    - cron: '0 14 * * 1,3,5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node --test scripts/__tests__/update_prices.test.js

      - name: Update commodity prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DRY_RUN: '0'
        run: node scripts/update_prices.js
